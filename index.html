<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  
  <title>Frontend Mentor | Tip calculator app</title>
  <link rel="stylesheet" href="style.css">

</head>
<body>

  <main>
    <section class="input_section">
    <p class="bill_label">Bill</p>
    <div class="bill_input">
      <img src="images/icon-dollar.svg" alt=" icon-dollar" class="dollar_icon">
      <input type="text" name="bill_amount" id="bill_display_input" placeholder="0">
  
    </div>

    <p class="selecting_label">Select Tip %</p>

    <div class="percent_container">
      <button id="percent_btn"">5%</button>
      <button id="percent_btn"">10%</button>
      <button id="percent_btn"">15%</button>
      <button id="percent_btn"">25%</button> 
      <button id="percent_btn"">50%</button> 
      <input type="text" placeholder="Custom" id="custom_tip_input"></input>
    </div>

    <div class="people_label_container">
      <p class="number_label">Number of People</p>
      <p class="warning">People can not be Zero</p>
    </div>

    <div class="number_people_container">
      <img src="images/icon-person.svg" alt="icon-person" class="person_icon">
      <input type="text" name="numPersonInput" id="person_num" placeholder="0">
    </div>
    </section>

    <section class="result_section">
      
      <div class="result_container">
        <div> 
          <h4>Tip Amount</h4>
          <p>/ person</p>
        </div>
        <h1 id="tip_amount_per_person">$0.00</h1>
        
        <div> 
            <h4>Total</h4>
            <p>/ person</p>
        </div>
        <h1 id="total_per_person">$0.00</h1>
      </div>

    <button id="reset">Reset</button>
    </section>
  </main>
  <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>. 
    Coded by <a href="#">Your Name Here</a>.
  </footer>

  <script src="script.js"></script>
</body>
</html>
